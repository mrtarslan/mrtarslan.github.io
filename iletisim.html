<script src="loader.js"></script>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// koordinatlar
var lat = 39.911620;
var lon = 32.751893;

// harita oluştur
var map = L.map('map',{
minZoom:1
}).setView([lat,lon],13);

// OpenStreetMap katmanı
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'&copy; OpenStreetMap contributors',
noWrap:true
}).addTo(map);

// marker ekle
L.marker([lat,lon])
.addTo(map)
.bindPopup("Çevre Şehir ve İklim Değişikliği Bakanlığı <br>" )
.openPopup();

</script>
